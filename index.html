<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temp Mail</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📧 Temp Mail Generator</h1>

    <div class="email-box">
        <input type="text" id="email" readonly>
        <button onclick="generateEmail()">Generate</button>
    </div>

    <button class="refresh" onclick="loadInbox()">🔄 Refresh Inbox</button>

    <div id="inbox"></div>
</div>

<script src="script.js"></script>
</body>
</html>
